# ==============================================
# Test Configuration - H2 In-Memory Database
# ==============================================
spring.application.name=visual-site-builder-test

# H2 In-Memory Database (fresh for each test)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Flyway - use Hibernate ddl-auto instead for tests
spring.flyway.enabled=false

# Disable H2 Console in tests
spring.h2.console.enabled=false

# Plugin System - disabled for unit tests
app.plugin.directory=target/test-plugins
app.plugin.hot-reload.enabled=false
app.plugin.validation.enabled=false

# JWT Configuration for tests
app.jwt.secret=dGVzdC1zZWNyZXQta2V5LWZvci11bml0LXRlc3Rpbmctb25seS0yNTYtYml0cw==
app.jwt.access-token-expiration=900000
app.jwt.refresh-token-expiration=604800000
app.jwt.issuer=flashcard-cms-test

# CORS - allow all in tests
cors.allowed-origins=http://localhost:5173
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allow-credentials=true

# Security
security.public-api-patterns=/api/sample/**

# Auth Server - disabled in tests
app.auth-server.enabled=false
app.auth-server.issuer-uri=http://localhost:9001
app.auth-server.jwk-set-uri=http://localhost:9001/oauth2/jwks

# Logging - minimal in tests
logging.level.root=WARN
logging.level.dev.mainul35=INFO
logging.level.org.springframework.test=INFO
